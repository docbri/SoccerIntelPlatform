name: Databricks CI

on:
  pull_request:
    paths:
      - "databricks/**"
      - ".github/workflows/databricks-ci.yml"

  push:
    branches:
      - main
    paths:
      - "databricks/**"
      - ".github/workflows/databricks-ci.yml"

  workflow_dispatch:

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate expected Databricks files exist
        run: |
          test -f databricks/databricks.yml
          test -f databricks/resources/jobs.yml

          test -f databricks/src/bronze/bronze_ingestion_flow.py
          test -f databricks/src/bronze/bronze_raw_ingestion_events_sql.sql
          test -f databricks/src/bronze/bronze_raw_ingestion_quarantine_sql.sql

          test -f databricks/src/silver/silver_league_status_events.py

          test -f databricks/src/gold/gold_current_league_status.py

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
        run: |
          databricks bundle validate -t staging

      - name: Python syntax check
        run: |
          python -m py_compile $(find databricks/src -name "*.py")

  deploy-staging:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate-structure
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to staging
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy -t staging

      - name: Run medallion slice
        working-directory: databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle run medallion-slice -t staging
