bundle:
  name: soccerintel-platform

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name
  bronze_schema:
    description: Bronze schema name
  silver_schema:
    description: Silver schema name
  gold_schema:
    description: Gold schema name
  workspace_root:
    description: Workspace root path for bundle deployment
  kafka_bootstrap_servers:
    description: Kafka/Redpanda bootstrap server for Bronze ingestion
  kafka_topic_name:
    description: Kafka/Redpanda topic name for raw ingestion events
  snowflake_database:
    description: Snowflake database for curated Gold publication
  snowflake_schema:
    description: Snowflake schema for curated Gold publication
  snowflake_table:
    description: Snowflake table for current league status publication
  snowflake_secret_scope:
    description: Databricks secret scope containing Snowflake key-pair connection values

targets:
  staging:
    mode: development
    default: true

    workspace:
      root_path: ${var.workspace_root}

    variables:
      catalog: soccerintel_staging
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      workspace_root: /Workspace/Users/drbrianmyers@outlook.com/soccerintel
      kafka_topic_name: soccer.raw.ingestion.dev
      snowflake_database: SOCCERINTEL_STAGING
      snowflake_schema: GOLD
      snowflake_table: CURRENT_LEAGUE_STATUS
      snowflake_secret_scope: soccerintel-staging-snowflake
