resources:
  jobs:
    medallion-slice:
      name: soccerintel-medallion-slice

      job_clusters:
        - job_cluster_key: medallion_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_D4ds_v4
            num_workers: 1
            data_security_mode: SINGLE_USER

      tasks:
        - task_key: bronze
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/bronze/bronze_ingestion_flow.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--bronze_schema"
              - ${var.bronze_schema}

        - task_key: silver
          depends_on:
            - task_key: bronze
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/silver/silver_league_status_events.py

        - task_key: gold
          depends_on:
            - task_key: silver
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/gold/gold_current_league_status.py
            