resources:
  jobs:
    medallion-slice:
      name: soccerintel-medallion-slice

      job_clusters:
        - job_cluster_key: medallion_cluster
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: Standard_D4ads_v6
            num_workers: 0
            autotermination_minutes: 60
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
            data_security_mode: SINGLE_USER
      
      tasks:
        - task_key: bronze
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/bronze/bronze_ingestion_flow.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--bronze_schema"
              - ${var.bronze_schema}

        - task_key: silver
          depends_on:
            - task_key: bronze
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/silver/silver_league_status_events.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--bronze_schema"
              - ${var.bronze_schema}
              - "--silver_schema"
              - ${var.silver_schema}

        - task_key: gold
          depends_on:
            - task_key: silver
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ../src/gold/gold_current_league_status.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--silver_schema"
              - ${var.silver_schema}
              - "--gold_schema"
              - ${var.gold_schema}
            